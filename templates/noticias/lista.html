{% extends "base_noticias.html"  %}

{% block title %}
Sitio de Noticias
{% endblock %}

{% block content %}
    <div class="container text-center">
        <h1 class="mt-3">Portal de Noticias</h1>
        {% for noticia in noticias %}
        <div class="card-group gap-3 mt-5">
            <div class="card">
                <div class="card-header">
                    <h3>{{noticia.titulo}}</h3>
                </div>
                <div class="card-body">
                    <p>{{noticia.contenido}}</p>
                </div>
                <div class="footer-card">
                    <small>{{noticia.fecha_publicacion}}</small>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
{% endblock %}
