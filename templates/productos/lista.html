{% extends "base_productos.html"  %}

{% block title %}
Lista de productos
{% endblock %}

{% block content %}

   <h1>Lista de Productos</h1>

    {% for producto in productos %}

    <h2>{{producto.nombre}}</h2>
    <p>{{producto.precio}}</p>
    <p>{{producto.descripcion}}</p>
    {% if producto.imagen %}
    <img src="{{ producto.imagen.url }}" alt="Producto" width="200">
    {% endif %}
    <hr>
    {% endfor %}

{% endblock %}
